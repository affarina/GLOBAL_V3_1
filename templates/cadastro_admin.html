<!DOCTYPE html>
<html>
<head>
    <title>Administração de Cadastro</title>
    <style>
        body { background:#0f172a; color:#e5e7eb; font-family:Arial; padding:40px; }
        .card {
            background:rgba(255,255,255,0.06);
            padding:25px;
            border-radius:16px;
            margin-bottom:30px;
        }
        input { padding:8px; margin-right:10px; }
        button { padding:8px 14px; cursor:pointer; }
        table { width:100%; margin-top:20px; border-collapse:collapse; }
        th, td { padding:10px; border-bottom:1px solid rgba(255,255,255,0.08); }
    </style>
</head>
<body>

<h2>Administração de Cadastro</h2>

<div class="card">
    <h3>Adicionar Novo Usuário</h3>
    <form method="POST" action="/cadastro_adicionar">
        Número:
        <input type="text" name="numero" required>
        Franquia (GB):
        <input type="number" step="0.1" name="franquia" required>
        <button type="submit">Adicionar</button>
    </form>
</div>

<div class="card">
    <h3>Usuários Cadastrados</h3>

    <table>
        <tr>
            <th>Número</th>
            <th>Franquia (GB)</th>
            <th>Ações</th>
        </tr>

        {% for u in usuarios %}
        <tr>
            <form method="POST" action="/cadastro_editar">
                <td>
                    <input type="hidden" name="numero_antigo" value="{{ u.numero }}">
                    <input type="text" name="numero_novo" value="{{ u.numero }}">
                </td>
                <td>
                    <input type="number" step="0.1" name="franquia" value="{{ (u.franquia_mb/1024)|round(2) }}">
                </td>
                <td>
                    <button type="submit">Salvar</button>
            </form>

            <form method="POST" action="/cadastro_excluir" style="display:inline;">
                <input type="hidden" name="numero" value="{{ u.numero }}">
                <button type="submit" style="background:#ef4444;color:white;">Excluir</button>
            </form>

                </td>
        </tr>
        {% endfor %}
    </table>

</div>

<a href="/">⬅ Voltar ao Dashboard</a>

</body>
</html>
